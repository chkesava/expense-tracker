[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY,VITE_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_PROJECT_ID,VITE_FIREBASE_STORAGE_BUCKET,VITE_FIREBASE_MESSAGING_SENDER,VITE_FIREBASE_APP_ID,VITE_FIREBASE_MEASUREMENT_ID"
  # Public site URL for payment share links (override in Netlify UI if needed)
  VITE_PUBLIC_APP_URL = "https://kesavaexpensetracker.netlify.app"


[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
